<div class="fade-in">
  <div class="page-header">
    <div>
      <h1>{{ isEdit ? ' Modifier le Médecin' : ' Nouveau Médecin' }}</h1>
      <p class="subtitle">Gérer les informations du médecin</p>
    </div>
    <a routerLink="/medecins" class="btn btn-outline">← Retour</a>
  </div>

  <div class="card" style="max-width: 800px;">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <!-- Photo -->
      <div class="photo-section">
        <div class="photo-preview">
          <img *ngIf="photoPreview" [src]="photoPreview" alt="Photo" />
          <div *ngIf="!photoPreview" class="photo-placeholder">
            <span>👨‍⚕️</span>
            <p>Photo du médecin</p>
          </div>
        </div>
        <div>
          <input type="file" id="photo" accept="image/*" (change)="onPhotoChange($event)" hidden />
          <label for="photo" class="btn btn-outline"> Choisir</label>
          <p style="font-size:12px; color:#94A3B8; margin-top:6px;">JPG, PNG • Max 5MB</p>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Prénom *</label>
          <input formControlName="prenom" placeholder="Prénom" [class.invalid]="f['prenom'].invalid && f['prenom'].touched" />
          <div class="error-msg" *ngIf="f['prenom'].invalid && f['prenom'].touched">Requis</div>
        </div>
        <div class="form-group">
          <label>Nom *</label>
          <input formControlName="nom" placeholder="Nom" [class.invalid]="f['nom'].invalid && f['nom'].touched" />
          <div class="error-msg" *ngIf="f['nom'].invalid && f['nom'].touched">Requis</div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Spécialité *</label>
          <select formControlName="specialite" [class.invalid]="f['specialite'].invalid && f['specialite'].touched">
            <option value="">Sélectionner...</option>
            <option *ngFor="let s of specialites" [value]="s">{{ s }}</option>
          </select>
          <div class="error-msg" *ngIf="f['specialite'].invalid && f['specialite'].touched">Requis</div>
        </div>
        <div class="form-group">
          <label>Téléphone *</label>
          <input formControlName="telephone" placeholder="12345678" [class.invalid]="f['telephone'].invalid && f['telephone'].touched" />
          <div class="error-msg" *ngIf="f['telephone'].invalid && f['telephone'].touched">8 chiffres</div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" formControlName="email" placeholder="dr.nom@clinique.tn" />
        </div>
        <div class="form-group">
          <label>Disponibilité</label>
          <select formControlName="disponible">
            <option [value]="true"> Disponible</option>
            <option [value]="false"> Indisponible</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Heure de début</label>
          <input type="time" formControlName="horaires.debut" />
        </div>
        <div class="form-group">
          <label>Heure de fin</label>
          <input type="time" formControlName="horaires.fin" />
        </div>
      </div>

      <div class="form-actions">
        <a routerLink="/medecins" class="btn btn-outline">Annuler</a>
        <button type="submit" class="btn btn-primary" [disabled]="loading">
          {{ loading ? '⏳ Enregistrement...' : (isEdit ? ' Mettre à jour' : ' Créer') }}
        </button>
      </div>
    </form>
  </div>
</div>
